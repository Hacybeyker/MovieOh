name: Android Quality

on:
  workflow_call:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          check-latest: true

      - name: Setup Project
        uses: ./.github/actions/android

      - name: Set Local Properties
        uses: ./.github/actions/local-properties
        with:
          key-prod: ${{ secrets.LOCAL_PROPERTIES_KEY_PROD }}
          key-qa: ${{ secrets.LOCAL_PROPERTIES_KEY_QA }}

      - name: Run Lint
        uses: ./.github/actions/lint

      - name: Upload Lint Test Report
        uses: actions/upload-artifact@v7
        with:
          name: lint_report
          path: app/build/reports/lint-results-debug.html

      - name: Upload Detekt Report
        uses: actions/upload-artifact@v7
        with:
          name: detekt_report
          path: app/build/reports/detekt

      - name: Run Tests
        run: ./gradlew app:testDebugUnitTest

      - name: Upload Test Report
        uses: actions/upload-artifact@v7
        with:
          name: unit_test_report
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Run Jacoco Test Report
        run: ./gradlew app:jacocoTestReport

      - name: Upload Coverage Test Report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco_test_report
          path: app/build/reports/jacoco/jacocoTestReport/

      - name: Run Jacoco Test Coverage Verification
        run: ./gradlew app:jacocoTestCoverageVerification

      - name: Run SonarQube Scan
        run: ./gradlew app:sonar -Dsonar.host.url=https://sonarcloud.io/ -Dsonar.token=${{ secrets.SONARCLOUDTOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
